{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RACK+{% endblock %}</title>
    <link rel="icon" href="{% static 'img/logo.png' %}" type="image/png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    {% block extra_css %}{% endblock %}
</head>
<body>

    {% if user.is_authenticated %}
        <header class="d-none d-md-flex justify-content-end p-3 position-fixed top-0 end-0" style="z-index: 1000;">
            <div class="dropdown">
                <a href="#" data-bs-toggle="dropdown">
                    <img src="{% static 'img/icon-userpadrao.png' %}" alt="User" class="icone-nav">
                </a>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><span class="dropdown-item-text small text-muted">Olá, {{ user.username }}</span></li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <form action="{% url 'logout' %}" method="post" class="px-3">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-danger btn-sm w-100 text-white">Sair</button>
                        </form>
                    </li>
                </ul>
            </div>
        </header>

        <nav class="d-none d-md-flex flex-column align-items-center vh-100 position-fixed top-0 start-0 barra-lateral-desktop py-3 shadow">
            <a href="{% url 'gestao:home' %}"><img src="{% static 'img/logo.png' %}" class="icone-nav mb-5"></a>
            <a href="#"><img src="{% static 'img/icon-lupa.png' %}" class="icone-nav my-2"></a>
            <a href="#"><img src="{% static 'img/icon-dashboard.png' %}" class="icone-nav my-2"></a>
            <a href="{% url 'gestao:device_gerenciar' %}"><img src="{% static 'img/icon-logs.png' %}" class="icone-nav my-2"></a>
        </nav>

        <nav class="d-md-none d-flex justify-content-between align-items-center bg-white shadow-sm p-3 sticky-top">
            <a href="#" data-bs-toggle="offcanvas" data-bs-target="#menuMobile">
                <img src="{% static 'img/icon-menu.png' %}" alt="Menu" style="width: 30px;">
            </a>
            <img src="{% static 'img/logo.png' %}" alt="Logo" style="width: 30px;">
            <div class="dropdown">
                <a href="#" data-bs-toggle="dropdown">
                    <img src="{% static 'img/icon-userpadrao.png' %}" alt="User" class="icone-nav">
                </a>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><span class="dropdown-item-text small text-muted">Olá, {{ user.username }}</span></li>
                    <li><hr class="dropdown-divider"></li>
                    <li>
                        <form action="{% url 'logout' %}" method="post" class="px-3">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-danger btn-sm w-100 text-white">Sair</button>
                        </form>
                    </li>
                </ul>
            </div>
        </nav>

        <div class="offcanvas offcanvas-start d-md-none" tabindex="-1" id="menuMobile">
            <div class="offcanvas-header"><button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button></div>
            <div class="offcanvas-body d-flex flex-column align-items-center">
                <a href="{% url 'gestao:home' %}" class="mb-4"><img src="{% static 'img/icon-home.png' %}" class="icone-nav"></a>
                <a href="#" class="mb-4"><img src="{% static 'img/icon-dashboard.png' %}" class="icone-nav"></a>
                <a href="{% url 'gestao:device_gerenciar' %}" class="mb-4"><img src="{% static 'img/icon-logs.png' %}" class="icone-nav"></a>
            </div>
        </div>
    {% endif %}

    <main class="{% if user.is_authenticated %}conteudo-principal{% endif %} p-3 p-md-4">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
