{% extends 'base.html' %}
{% load static %}

{% block title %}Dashboard | RACK+{% endblock %}

{% block content %}
    <div class="text-center mb-5 d-none d-md-block">
        <h1 class="fw-bold display-6">Salas</h1>
    </div>

    <div class="d-md-none mb-4">
        <div class="input-group bg-white rounded-pill shadow-sm overflow-hidden p-1">
            <span class="input-group-text bg-transparent border-0"><i class="bi bi-search text-muted"></i></span>
            <input type="text" class="form-control border-0" placeholder="PESQUISAR...">
        </div>
    </div>

    <div class="row g-3 g-lg-4">
        {% for sala in salas %}
            <div class="col-6 col-md-4 col-lg-3">
                <a href="{% url 'gestao:sala_detalhe' sala.pk %}" class="card text-decoration-none shadow-sm border-0 rounded-4 overflow-hidden">
                    <div class="card-body p-0 position-relative">
                        <img src="{% static 'img/icon-sala.png' %}" class="w-100" style="height: 160px; object-fit: cover;">
                        
                        <div class="position-absolute bottom-0 start-0 end-0 p-2 d-flex justify-content-between align-items-end text-white" 
                             style="background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);">
                            <span class="fw-bold">{{ sala.nome }}</span>
                            <span class="indicador-status {% if forloop.counter|divisibleby:2 %}bg-success{% else %}bg-danger{% endif %}"></span>
                        </div>
                    </div>
                </a>
            </div>
        {% empty %}
            <div class="col-12 text-center text-muted py-5">
                <p>Nenhuma sala cadastrada no sistema.</p>
            </div>
        {% endfor %}
    </div>
{% endblock %}
